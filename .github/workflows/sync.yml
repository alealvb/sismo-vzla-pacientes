name: Sincronizar datos

# Sincroniza el registro desde Google Drive y, si hay cambios, commitea docs/data.json.
# GitHub Pages (configurado como "deploy from branch: main /docs") republica solo.
# Requiere que GitHub Actions esté habilitado en la cuenta (ver README si falla por facturación).

on:
  schedule:
    - cron: "*/5 * * * *"     # cada ~5 min (GitHub puede retrasarlo en picos de carga)
  workflow_dispatch:           # botón "Run workflow" manual
  push:
    branches: [main]
    paths-ignore:
      - "docs/data.json"       # evita re-disparo por el commit de datos

permissions:
  contents: write              # commit del data.json

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Sincronizar desde Google Drive
        run: python scripts/sync.py
      - name: Commit de docs/data.json si cambió
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- docs/data.json; then
            git add docs/data.json
            git commit -m "datos: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "Sin cambios en los datos."
          fi
